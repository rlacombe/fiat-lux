<svg xmlns="http://www.w3.org/2000/svg" width="680" height="440" viewBox="0 0 680 440">
  <style>
    .bg { fill: #1a1b26; }
    .titlebar { fill: #24283b; }
    .btn-close { fill: #f7768e; }
    .btn-min { fill: #e0af68; }
    .btn-max { fill: #9ece6a; }
    .title { fill: #565f89; font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 12px; }
    .prompt { fill: #7aa2f7; font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 13px; }
    .cmd { fill: #c0caf5; font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 13px; }
    .dim { fill: #565f89; font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 13px; }
    .user-label { fill: #7dcfff; font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 13px; font-weight: bold; }
    .user-text { fill: #c0caf5; font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 13px; }
    .lux-label { fill: #9ece6a; font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 13px; font-weight: bold; }
    .lux-text { fill: #a9b1d6; font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 13px; }
    .lux-highlight { fill: #e0af68; font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 13px; }
    .lux-science { fill: #7aa2f7; font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 13px; font-style: italic; }
  </style>

  <!-- Window -->
  <rect class="bg" width="680" height="440" rx="10"/>
  <rect class="titlebar" width="680" height="36" rx="10"/>
  <rect class="titlebar" y="20" width="680" height="16"/>

  <!-- Traffic lights -->
  <circle class="btn-close" cx="20" cy="18" r="6"/>
  <circle class="btn-min" cx="40" cy="18" r="6"/>
  <circle class="btn-max" cx="60" cy="18" r="6"/>
  <text class="title" x="310" y="22" text-anchor="middle">lux</text>

  <!-- $ lux -->
  <text class="prompt" x="20" y="64">$</text>
  <text class="cmd" x="36" y="64">lux</text>

  <!-- Header -->
  <text class="dim" x="20" y="86">Lux -- your chronobiology-powered lighting assistant</text>
  <text class="dim" x="20" y="104">Type a command, or 'quit' to exit.</text>

  <!-- Turn 1 -->
  <text class="user-label" x="20" y="134">You:</text>
  <text class="user-text" x="60" y="134">I'm about to read in bed, set up my lights</text>

  <text y="162">
    <tspan class="lux-label" x="20">Lux:</tspan>
    <tspan class="lux-text" x="60">Night stand set to </tspan>
    <tspan class="lux-highlight">deep amber (2200K)</tspan>
    <tspan class="lux-text"> at </tspan>
    <tspan class="lux-highlight">40%</tspan>
    <tspan class="lux-text"> -- everything else off.</tspan>
  </text>
  <text class="lux-science" x="60" y="180">Near-zero melanopic impact, so your melatonin stays untouched.</text>

  <!-- Turn 2 -->
  <text class="user-label" x="20" y="218">You:</text>
  <text class="user-text" x="60" y="218">candle 10m</text>

  <text y="246">
    <tspan class="lux-label" x="20">Lux:</tspan>
    <tspan class="lux-text" x="60">Candle mode started on night stand, </tspan>
    <tspan class="lux-highlight">fading out over 10min</tspan>
    <tspan class="lux-text">.</tspan>
  </text>

  <!-- Turn 3 -->
  <text class="user-label" x="20" y="284">You:</text>
  <text class="user-text" x="60" y="284">wake me up with a sunrise at 7:30</text>

  <text y="312">
    <tspan class="lux-label" x="20">Lux:</tspan>
    <tspan class="lux-text" x="60">Scheduled! Lights will ramp from </tspan>
    <tspan class="lux-highlight">warm amber</tspan>
    <tspan class="lux-text"> to </tspan>
    <tspan class="lux-highlight">full daylight</tspan>
  </text>
  <text class="lux-text" x="60" y="330">over 20 minutes starting at 7:30 AM.</text>
  <text class="lux-science" x="60" y="348">Sweet dreams.</text>

  <!-- Cursor -->
  <text class="user-label" x="20" y="386">You:</text>
  <rect x="60" y="374" width="8" height="16" fill="#7dcfff" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
